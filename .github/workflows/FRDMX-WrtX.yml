#==========================================================================
# Description: Frdmx compile mainline stable kernel
#==========================================================================

name: Frdmx-WrtX

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      kernel_source:
        description: "Select the kernel source"
        required: false
        default: "atho13"
        type: choice
        options:
          - unifreq
          - ophub
          - atho13
      kernel_version:
        description: "Select kernel version"
        required: false
        default: "6.14.y"
        type: choice
        options:
          - 5.4.y
          - 5.10.y
          - 5.15.y
          - 6.1.y
          - 6.6.y
          - 6.12.y
          - 6.14.y
          - 6.18.y
      kernel_auto:
        description: "Auto use the latest kernel"
        required: false
        default: true
        type: boolean
      delete_source:
        description: "Delete source after compilation"
        required: false
        default: true
        type: boolean
      kernel_package:
        description: "Select compile package list"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - dtbs
      kernel_toolchain:
        description: "Select the compilation toolchain"
        required: false
        default: "gcc"
        type: choice
        options:
          - clang
          - gcc
          - gcc-15.2
          - gcc-14.3
          - gcc-14.2
      ccache_clear:
        description: "Set whether to clear the cache"
        required: false
        default: false
        type: boolean
      docker_image:
        description: "Select Armbian docker image"
        required: false
        default: "noble"
        type: choice
        options:
          - resolute
          - noble
      kernel_sign:
        description: "Set the kernel custom signature"
        required: false
        default: "-FRDMX"
        type: choice
        options:
          - -ophub
          - -FRDMX
      kernel_config:
        description: "Set the path of kernel .config"
        required: false
        default: "kernel-config/release/stable"
        type: choice
        options:
          - kernel-config/release/stable
          - false

env:
  TZ: Etc/UTC

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set build matrix based on kernel_version input
        id: set-matrix
        run: |
          if [[ "${{ inputs.kernel_version }}" == "all" ]]; then
            MATRIX='{"include":[{"kernel_version":"6.1.y"},{"kernel_version":"6.6.y"},{"kernel_version":"6.12.y"},{"kernel_version":"6.18.y"}]}'
          else
            MATRIX='{"include":[{"kernel_version":"${{ inputs.kernel_version }}"}]}'
          fi
          echo "matrix=${MATRIX}" >> "${GITHUB_OUTPUT}"
  build:
    needs: setup
    runs-on: ubuntu-24.04-arm
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    name: compile-kernel-${{ matrix.kernel_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize the build environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y install $(curl -fsSL https://ophub.org/ubuntu2404-build-armbian-depends)
          sudo -E systemctl daemon-reload
          #sudo -E apt-get -y full-upgrade
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
          sudo rm -rf ~/{.cargo,.dotnet,.rustup}
          sudo -E timedatectl set-timezone "${TZ:-Etc/UTC}"
          sudo -E ntpdate ntp.ubuntu.com 0.pool.ntp.org || true
          sudo -E timedatectl set-ntp true
          date -u
          timedatectl status || true
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Create virtual disk for extended storage
        id: disk
        run: |
          # Get available space in exact GB
          root_avail=$(df --block-size=1G / | tail -1 | awk '{print $4}')
          root_size=$(( root_avail - 4 ))
          [[ "${root_size}" -gt 0 ]] || { echo "Error: Insufficient space on /: ${root_avail}G available"; exit 1; }
          sudo truncate -s "${root_size}"G /root.img
          build_dev=$(sudo losetup --find --show /root.img)
          echo "Using /: ${root_size}G"
          sudo mkfs.xfs -f -i sparse=0 -b size=4096 "${build_dev}"
          sudo mkdir -p /builder
          sudo mount "${build_dev}" /builder
          sudo chown -R runner:runner /builder
          df -Th
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Get kernel source commit hash
        id: kernelhash
        run: |
          # Get the latest source hash from the kernel repository
          api_url="https://api.github.com/repos/${{ inputs.kernel_source }}/linux-${{ matrix.kernel_version }}/git/ref/heads/main"
          source_hash=$(curl -fsSL -m 20 \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              ${api_url} |
              jq -r '.object.sha'
          )
          [[ -z "${source_hash}" || "${source_hash}" == "null" ]] && source_hash="${{ github.sha }}"
          echo "source_hash=${source_hash}" >> ${GITHUB_ENV}
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: /builder/ccache
          key: kernel-mainline-${{ inputs.kernel_toolchain }}-${{ matrix.kernel_version }}-${{ env.source_hash }}
          restore-keys: |
            kernel-mainline-${{ inputs.kernel_toolchain }}-${{ matrix.kernel_version }}-

      - name: FRDMX WRT MOD
        run: |
          mkdir -p kernel-config/release
          
          KERNEL_MAJOR=$(echo "${{ matrix.kernel_version }}" | cut -d. -f1-2)
          TARGET_CONFIG="kernel-config/release/config-${KERNEL_MAJOR}"
          
          echo "==> Membuat file konfigurasi otomatis untuk Kernel ${{ matrix.kernel_version }} -> ${TARGET_CONFIG}"
          
          cat <<EOT > "$TARGET_CONFIG"
             CONFIG_WATCHDOG=y
             CONFIG_WATCHDOG_CORE=y
             CONFIG_MESON_WATCHDOG=y
             # CONFIG_WATCHDOG_NOWAYOUT is not set
             CONFIG_PANIC_ON_OOPS=y
             CONFIG_PANIC_TIMEOUT=5
             CONFIG_NETFILTER=y
             CONFIG_NET_CORE=y
             CONFIG_NF_CONNTRACK=y
             CONFIG_NETFILTER_NETLINK=y
             CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y
             CONFIG_NETFILTER_XT_MATCH_STATE=y
             CONFIG_ARCH_MESON=y
             CONFIG_COMMON_CLK_G12A=y
             CONFIG_RESET_CONTROLLER=y
             CONFIG_RESET_MESON=y
             CONFIG_USB_DWC3=y
             CONFIG_USB_DWC3_DUAL_ROLE=y
             CONFIG_USB_DWC3_GENERIC_PLAT=y
             CONFIG_USB_SERIAL=y
             CONFIG_USB_SERIAL_WWAN=y
             CONFIG_USB_SERIAL_OPTION=y
             CONFIG_USB_NET_DRIVERS=y
             CONFIG_USB_USBNET=y
             CONFIG_USB_NET_CDCETHER=y
             CONFIG_USB_NET_CDC_NCM=y
             CONFIG_USB_NET_HUAWEI_CDC_NCM=y
             CONFIG_USB_NET_CDC_MBIM=y
             CONFIG_USB_NET_RNDIS_HOST=y
             CONFIG_USB_NET_QMI_WWAN=y
             CONFIG_USB_NET_CDC_SUBSET=y
             CONFIG_USB_NET_ZAURUS=y
             CONFIG_USB_NET_NET1080=y
             CONFIG_USB_NET_PLUSB=y
             CONFIG_USB_NET_QMI_WWAN_SIM=y
             CONFIG_USB_SERIAL_FTDI_SIO=y
             CONFIG_USB_SERIAL_PL2303=y
             CONFIG_USB_SERIAL_CH341=y
             CONFIG_TCP_CONG_ADVANCED=y
             CONFIG_TCP_CONG_BBR=y
             CONFIG_DEFAULT_TCP_CONG="bbr"
             CONFIG_NETFILTER_XT_TARGET_TPROXY=y
             CONFIG_NETFILTER_XT_MATCH_SOCKET=y
             CONFIG_CRYPTO_AES_ARM64_CE_BLK=y
             CONFIG_CRYPTO_CHACHA20_NEON=y
             CONFIG_CRYPTO_POLY1305_ARM64=y
             CONFIG_CRYPTO_CHACHA20POLY1305=y
             CONFIG_CRYPTO_SHA1_ARM64_CE=y
             CONFIG_CRYPTO_SHA2_ARM64_CE=y
             CONFIG_CRYPTO_SHA512_ARM64_CE=y
             CONFIG_PREEMPT_VOLUNTARY=y
             CONFIG_SCHED_MC=y
             CONFIG_HZ_100=y
             # CONFIG_HZ_250 is not set
             # CONFIG_HZ_1000 is not set
             CONFIG_NET_SCH_FQ=y
             CONFIG_NET_SCH_FQ_CODEL=y
             CONFIG_NET_CLS_ACT=y
             CONFIG_NET_ACT_POLICE=y
             CONFIG_SLUB=y
             # CONFIG_SLAB is not set
             CONFIG_ZRAM=y
             CONFIG_ZRAM_DEF_COMP_LZ4=y
             CONFIG_ZSMALLOC=y
             CONFIG_NET_FLOW_LIMIT=y
             CONFIG_RPS=y
             CONFIG_XPS=y
             # CONFIG_SOUND is not set
             # CONFIG_SND is not set
             # CONFIG_SND_SOC is not set
             # CONFIG_MEDIA_SUPPORT is not set
             # CONFIG_VIDEO_DEV is not set
             # CONFIG_DRM is not set
             # CONFIG_DRM_MESON is not set
             # CONFIG_KALLSYMS_ALL is not set
             # CONFIG_DEBUG_KERNEL is not set
             # CONFIG_PROFILING is not set
             # CONFIG_SCHED_DEBUG is not set
             # CONFIG_SLUB_DEBUG is not set
          EOT

          # Verifikasi otomatis: Hapus spasi kosong di awal baris jika ada tab yang tersisa
          sed -i 's/^[ \t]*//' "$TARGET_CONFIG"
          
          echo "==> Berhasil membuat berkas config kustom FRDMX!"
          cat "$TARGET_CONFIG" # Menampilkan isi file di log untuk memastikan tidak ada spasi depan
          ls -la kernel-config/release/

      - name: Compile the kernel [ ${{ matrix.kernel_version }} ]
        uses: ophub/amlogic-s9xxx-armbian@main
        if: ${{ steps.disk.outputs.status == 'success' && !cancelled() }}
        with:
          build_target: kernel
          kernel_source: ${{ inputs.kernel_source }}
          kernel_version: ${{ matrix.kernel_version }}
          kernel_auto: ${{ inputs.kernel_auto }}
          delete_source: ${{ inputs.delete_source }}
          kernel_package: ${{ inputs.kernel_package }}
          kernel_toolchain: ${{ inputs.kernel_toolchain }}
          kernel_sign: ${{ inputs.kernel_sign }}
          kernel_config: ${{ inputs.kernel_config }}
          ccache_clear: ${{ inputs.ccache_clear }}
          docker_hostpath: /builder
          docker_image: ophub/armbian-${{ inputs.docker_image }}:arm64

      - name: Upload Kernel to Release
        uses: ophub/upload-to-releases@main
        if: ${{ env.PACKAGED_STATUS == 'success' && !cancelled() }}
        with:
          tag: kernel_stable
          artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*
          allow_updates: true
          remove_artifacts: false
          replaces_artifacts: true
          make_latest: true
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            - These are Mainline `stable` kernels that provide support for `Armbian`, `OpenWrt` and `FnNAS`.
            - It works with most `Amlogic`, `Rockchip`, and `Allwinner` devices. For specific details, please refer to the instructions on the homepage of each system's repository.。
